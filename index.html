<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MeLi Scanner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');

:root {
–meli-yellow: #FFE600;
–meli-blue: #3483FA;
–dark: #111318;
–dark2: #1C2030;
–dark3: #252A3A;
–text: #E8EAF0;
–muted: #7A80A0;
–success: #00C48C;
–radius: 18px;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–dark);
color: var(–text);
min-height: 100dvh;
display: flex;
flex-direction: column;
overflow-x: hidden;
}

/* Header */
.header {
padding: 20px 22px 16px;
display: flex;
align-items: center;
gap: 12px;
background: var(–dark2);
border-bottom: 1px solid rgba(255,255,255,0.06);
position: sticky;
top: 0;
z-index: 100;
}

.logo {
width: 38px; height: 38px;
background: var(–meli-yellow);
border-radius: 10px;
display: flex; align-items: center; justify-content: center;
font-family: ‘Syne’, sans-serif;
font-weight: 800;
font-size: 15px;
color: var(–dark);
flex-shrink: 0;
letter-spacing: -0.5px;
}

.header-text h1 {
font-family: ‘Syne’, sans-serif;
font-size: 18px;
font-weight: 800;
letter-spacing: -0.3px;
line-height: 1;
}

.header-text p {
font-size: 11.5px;
color: var(–muted);
margin-top: 2px;
}

/* Main content */
.main {
flex: 1;
padding: 22px 18px;
display: flex;
flex-direction: column;
gap: 20px;
max-width: 520px;
width: 100%;
margin: 0 auto;
}

/* Scanner section */
.scan-card {
background: var(–dark2);
border-radius: var(–radius);
border: 1px solid rgba(255,255,255,0.07);
overflow: hidden;
position: relative;
}

.scan-area {
position: relative;
width: 100%;
aspect-ratio: 4/3;
background: #000;
overflow: hidden;
}

#scanner-container {
width: 100%; height: 100%;
position: relative;
}

#scanner-container video {
width: 100% !important;
height: 100% !important;
object-fit: cover;
}

#scanner-container canvas {
position: absolute;
top: 0; left: 0;
width: 100% !important;
height: 100% !important;
}

.scan-overlay {
position: absolute;
inset: 0;
pointer-events: none;
display: flex;
align-items: center;
justify-content: center;
}

.scan-frame {
width: 72%;
height: 38%;
position: relative;
}

.scan-frame::before, .scan-frame::after,
.scan-frame span::before, .scan-frame span::after {
content: ‘’;
position: absolute;
width: 22px; height: 22px;
border-color: var(–meli-yellow);
border-style: solid;
}

.scan-frame::before { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
.scan-frame::after  { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
.scan-frame span::before { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
.scan-frame span::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

.scan-line {
position: absolute;
left: 10%; right: 10%;
height: 2px;
background: linear-gradient(90deg, transparent, var(–meli-yellow), transparent);
border-radius: 2px;
animation: scanMove 2s ease-in-out infinite;
box-shadow: 0 0 12px var(–meli-yellow);
top: 50%;
}

@keyframes scanMove {
0%, 100% { transform: translateY(-14px); opacity: 0.4; }
50% { transform: translateY(14px); opacity: 1; }
}

.scan-hint {
position: absolute;
bottom: 14px;
left: 0; right: 0;
text-align: center;
font-size: 12px;
color: rgba(255,255,255,0.65);
letter-spacing: 0.3px;
}

.scan-placeholder {
width: 100%;
aspect-ratio: 4/3;
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
gap: 14px;
background: var(–dark3);
color: var(–muted);
}

.scan-placeholder svg {
opacity: 0.5;
}

.scan-placeholder p {
font-size: 13px;
text-align: center;
line-height: 1.5;
max-width: 200px;
}

/* Scan card footer */
.scan-footer {
padding: 16px 18px;
display: flex;
gap: 10px;
align-items: center;
}

/* Buttons */
.btn {
display: flex;
align-items: center;
justify-content: center;
gap: 8px;
padding: 12px 20px;
border-radius: 12px;
border: none;
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
font-weight: 500;
cursor: pointer;
transition: all 0.18s ease;
flex: 1;
white-space: nowrap;
}

.btn-primary {
background: var(–meli-yellow);
color: var(–dark);
}

.btn-primary:active { transform: scale(0.97); background: #f0d800; }

.btn-secondary {
background: rgba(255,255,255,0.07);
color: var(–text);
border: 1px solid rgba(255,255,255,0.1);
}

.btn-secondary:active { transform: scale(0.97); background: rgba(255,255,255,0.12); }

.btn-danger {
background: rgba(255, 80, 80, 0.15);
color: #ff6b6b;
border: 1px solid rgba(255,80,80,0.2);
}

.btn-danger:active { transform: scale(0.97); }

.btn:disabled {
opacity: 0.4;
cursor: not-allowed;
transform: none !important;
}

/* OR divider */
.divider {
display: flex;
align-items: center;
gap: 10px;
color: var(–muted);
font-size: 12px;
}

.divider::before, .divider::after {
content: ‘’;
flex: 1;
height: 1px;
background: rgba(255,255,255,0.08);
}

/* Manual input */
.input-group {
display: flex;
gap: 8px;
}

.text-input {
flex: 1;
background: var(–dark3);
border: 1px solid rgba(255,255,255,0.1);
border-radius: 12px;
padding: 12px 16px;
color: var(–text);
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
outline: none;
transition: border-color 0.18s;
}

.text-input:focus { border-color: var(–meli-blue); }
.text-input::placeholder { color: var(–muted); }

/* Result card */
.result-card {
background: var(–dark2);
border-radius: var(–radius);
border: 1px solid rgba(255,255,255,0.07);
overflow: hidden;
animation: slideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1);
}

@keyframes slideUp {
from { opacity: 0; transform: translateY(20px); }
to   { opacity: 1; transform: translateY(0); }
}

.result-header {
padding: 14px 18px;
background: rgba(0, 196, 140, 0.08);
border-bottom: 1px solid rgba(0, 196, 140, 0.15);
display: flex;
align-items: center;
gap: 8px;
font-size: 12.5px;
color: var(–success);
font-weight: 500;
}

.result-header svg { flex-shrink: 0; }

.result-body {
padding: 18px;
display: flex;
flex-direction: column;
gap: 16px;
}

.barcode-display {
background: var(–dark3);
border-radius: 10px;
padding: 12px 16px;
display: flex;
align-items: center;
gap: 10px;
}

.barcode-display .label {
font-size: 10.5px;
text-transform: uppercase;
letter-spacing: 0.8px;
color: var(–muted);
font-weight: 500;
}

.barcode-display .value {
font-family: ‘Syne’, sans-serif;
font-size: 16px;
font-weight: 700;
letter-spacing: 1.5px;
color: var(–meli-yellow);
margin-top: 2px;
}

/* Product info */
.product-info {
display: flex;
flex-direction: column;
gap: 12px;
}

.product-image-wrap {
width: 100%;
border-radius: 12px;
overflow: hidden;
background: #fff;
aspect-ratio: 16/9;
display: flex;
align-items: center;
justify-content: center;
}

.product-image-wrap img {
width: 100%;
height: 100%;
object-fit: contain;
padding: 10px;
}

.product-title {
font-family: ‘Syne’, sans-serif;
font-size: 17px;
font-weight: 700;
line-height: 1.3;
letter-spacing: -0.2px;
}

.product-meta {
display: flex;
flex-direction: column;
gap: 7px;
}

.meta-row {
display: flex;
gap: 10px;
font-size: 13px;
align-items: flex-start;
}

.meta-row .key {
color: var(–muted);
min-width: 90px;
flex-shrink: 0;
}

.meta-row .val {
color: var(–text);
line-height: 1.4;
}

.tag {
display: inline-block;
background: rgba(52, 131, 250, 0.15);
color: var(–meli-blue);
border: 1px solid rgba(52,131,250,0.25);
border-radius: 6px;
font-size: 11px;
padding: 2px 8px;
font-weight: 500;
}

/* Loading */
.loading-state {
padding: 32px 18px;
display: flex;
flex-direction: column;
align-items: center;
gap: 14px;
text-align: center;
animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.spinner {
width: 42px; height: 42px;
border: 3px solid rgba(255,230,0,0.15);
border-top-color: var(–meli-yellow);
border-radius: 50%;
animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-state p {
font-size: 14px;
color: var(–muted);
line-height: 1.5;
}

/* Error */
.error-msg {
background: rgba(255,80,80,0.08);
border: 1px solid rgba(255,80,80,0.2);
border-radius: 12px;
padding: 14px 16px;
font-size: 13.5px;
color: #ff8080;
display: flex;
gap: 10px;
align-items: flex-start;
animation: slideUp 0.3s ease;
}

.beep-flash {
animation: flash 0.3s ease;
}

@keyframes flash {
0%, 100% { opacity: 1; }
50% { opacity: 0.3; }
}

/* Upload image button */
#file-input { display: none; }

/* Footer */
.footer {
padding: 14px 18px 28px;
text-align: center;
font-size: 11.5px;
color: var(–muted);
border-top: 1px solid rgba(255,255,255,0.05);
}
</style>

</head>

<script>
let scannerActive = false;
let lastCode = null;

// ─── Toggle scanner ───────────────────────────────
function toggleScanner() {
  if (scannerActive) {
    stopScanner();
  } else {
    startScanner();
  }
}

async function startScanner() {
  const container = document.getElementById('scanner-container');
  const placeholder = document.getElementById('scan-placeholder');
  const overlay = document.getElementById('scan-overlay');
  const btn = document.getElementById('btn-scan');

  // ── iOS / Safari requiere llamar getUserMedia ANTES que cualquier librería
  // para que aparezca el diálogo de permiso del sistema operativo.
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showError("Tu navegador no soporta acceso a la cámara. Usá Safari en iOS o Chrome en Android.");
    return;
  }

  // Mostrar estado "solicitando permiso"
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Esperando…`;
  btn.disabled = true;

  let stream;
  try {
    // Pedir permiso explícito — iOS muestra el popup del sistema aquí
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } },
      audio: false
    });
    // Detener el stream de prueba; Quagga abrirá el suyo propio
    stream.getTracks().forEach(t => t.stop());
  } catch (err) {
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Escanear`;
    btn.className = 'btn btn-primary';
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      showError("Permiso de cámara denegado. En iOS: Ajustes → Safari → Cámara → Permitir. Luego recargá la página.");
    } else if (err.name === 'NotFoundError') {
      showError("No se encontró ninguna cámara en este dispositivo.");
    } else {
      showError("No se pudo acceder a la cámara: " + err.message);
    }
    return;
  }

  // Permiso concedido — iniciar UI
  btn.disabled = false;
  placeholder.style.display = 'none';
  container.style.display = 'block';
  overlay.style.display = 'flex';
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg> Detener`;
  btn.className = 'btn btn-danger';

  Quagga.init({
    inputStream: {
      name: "Live",
      type: "LiveStream",
      target: container,
      constraints: {
        facingMode: { ideal: "environment" },
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    },
    locator: { patchSize: "medium", halfSample: true },
    numOfWorkers: navigator.hardwareConcurrency > 2 ? 2 : 1,
    frequency: 10,
    decoder: {
      readers: ["code_128_reader", "ean_reader", "ean_8_reader", "code_39_reader", "upc_reader", "upc_e_reader", "i2of5_reader"]
    },
    locate: true
  }, err => {
    if (err) {
      showError("No se pudo iniciar el escáner. Verificá los permisos de cámara y recargá la página.");
      stopScanner();
      return;
    }
    Quagga.start();
    scannerActive = true;
  });

  Quagga.onDetected(onBarcodeDetected);
}

function stopScanner() {
  Quagga.offDetected(onBarcodeDetected);
  try { Quagga.stop(); } catch(e) {}
  scannerActive = false;

  const container = document.getElementById('scanner-container');
  const placeholder = document.getElementById('scan-placeholder');
  const overlay = document.getElementById('scan-overlay');
  const btn = document.getElementById('btn-scan');

  container.style.display = 'none';
  placeholder.style.display = 'flex';
  overlay.style.display = 'none';
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Escanear`;
  btn.className = 'btn btn-primary';
}

function onBarcodeDetected(result) {
  const code = result.codeResult.code;
  if (!code || code === lastCode) return;
  lastCode = code;
  stopScanner();
  searchProduct(code);
}

// ─── Manual input ─────────────────────────────────
function searchManual() {
  const val = document.getElementById('manual-input').value.trim();
  if (!val) return;
  searchProduct(val);
}

document.getElementById('manual-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchManual();
});

// ─── Image upload ─────────────────────────────────
function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;

  Quagga.decodeSingle({
    decoder: {
      readers: ["code_128_reader", "ean_reader", "ean_8_reader", "code_39_reader", "upc_reader", "upc_e_reader"]
    },
    locate: true,
    src: URL.createObjectURL(file)
  }, result => {
    if (result && result.codeResult) {
      searchProduct(result.codeResult.code);
    } else {
      showError("No se encontró un código de barras en la imagen. Intentá con una foto más nítida.");
    }
  });
}

// ─── Search product via Claude ────────────────────
async function searchProduct(code) {
  hideError();
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('manual-input').value = code;

  try {
    const prompt = `Analizá el siguiente código de barras encontrado en una etiqueta de envío de MercadoLibre Argentina: "${code}"

Tu tarea es:
1. Identificar si es un código de envío de MercadoLibre (suelen empezar con patrones como OCA, Andreani, o tener formatos específicos)
2. Describir el tipo de código (EAN-13, Code 128, etc.)
3. Buscar si el número corresponde a algún producto conocido en el mercado
4. Proporcionar información útil sobre el producto o envío

Respondé SOLO en JSON válido con esta estructura exacta, sin markdown ni backticks:
{
  "tipo_codigo": "tipo de código de barras",
  "es_envio_meli": true/false,
  "numero_tracking": "número si es de envío, o null",
  "producto_nombre": "nombre del producto si se identifica, o descripción probable",
  "categoria": "categoría del producto (Electrónica, Ropa, Hogar, etc.)",
  "descripcion": "descripción detallada de qué es probablemente este artículo",
  "marca": "marca si se puede identificar, o null",
  "imagen_url": null,
  "confianza": "alta/media/baja",
  "info_adicional": "cualquier dato extra relevante"
}`;

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();

    if (data.error) throw new Error(data.error.message);

    const text = data.content.map(b => b.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();

    let product;
    try {
      product = JSON.parse(clean);
    } catch {
      throw new Error("No se pudo interpretar la respuesta de la IA.");
    }

    document.getElementById('loading').style.display = 'none';
    renderResult(code, product);

  } catch (err) {
    document.getElementById('loading').style.display = 'none';
    showError(err.message || "Error al identificar el producto. Intentá de nuevo.");
  }
}

// ─── Render result ────────────────────────────────
function renderResult(code, p) {
  const confidenceColor = { alta: '#00C48C', media: '#FFB830', baja: '#FF6B6B' }[p.confianza] || '#7A80A0';
  const confidenceLabel = { alta: 'Alta confianza', media: 'Confianza media', baja: 'Baja confianza' }[p.confianza] || '';

  const html = `
    <div class="result-card">
      <div class="result-header">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Producto identificado
        <span style="margin-left:auto;color:${confidenceColor};font-size:11px;">${confidenceLabel}</span>
      </div>
      <div class="result-body">
        <div class="barcode-display">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7A80A0" stroke-width="2"><path d="M3 5v14M8 5v14M12 5v14M17 5v14M21 5v14"/></svg>
          <div>
            <div class="label">Código escaneado</div>
            <div class="value">${code}</div>
          </div>
          <span class="tag" style="margin-left:auto;">${p.tipo_codigo || 'Desconocido'}</span>
        </div>

        <div class="product-info">
          <div class="product-title">${p.producto_nombre || 'Producto sin identificar'}</div>

          <div class="product-meta">
            ${p.categoria ? `
            <div class="meta-row">
              <span class="key">Categoría</span>
              <span class="val"><span class="tag">${p.categoria}</span></span>
            </div>` : ''}
            ${p.marca ? `
            <div class="meta-row">
              <span class="key">Marca</span>
              <span class="val">${p.marca}</span>
            </div>` : ''}
            ${p.es_envio_meli ? `
            <div class="meta-row">
              <span class="key">Tipo</span>
              <span class="val"><span class="tag" style="background:rgba(255,230,0,0.1);color:var(--meli-yellow);border-color:rgba(255,230,0,0.25);">Envío MercadoLibre</span></span>
            </div>` : ''}
            ${p.numero_tracking ? `
            <div class="meta-row">
              <span class="key">Tracking</span>
              <span class="val" style="font-family:'Syne',sans-serif;letter-spacing:0.5px;">${p.numero_tracking}</span>
            </div>` : ''}
            <div class="meta-row">
              <span class="key">Descripción</span>
              <span class="val">${p.descripcion || '—'}</span>
            </div>
            ${p.info_adicional ? `
            <div class="meta-row">
              <span class="key">Info extra</span>
              <span class="val" style="color:var(--muted);">${p.info_adicional}</span>
            </div>` : ''}
          </div>
        </div>

        <button class="btn btn-secondary" style="width:100%;" onclick="resetResult()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.89"/></svg>
          Escanear otro código
        </button>
      </div>
    </div>
  `;

  document.getElementById('result-area').innerHTML = html;
  document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  lastCode = null;
}

function resetResult() {
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('manual-input').value = '';
  lastCode = null;
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  document.getElementById('error-text').textContent = msg;
  el.style.display = 'flex';
  lastCode = null;
}

function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}
</script>

</body>
</html>
