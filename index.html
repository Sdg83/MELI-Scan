<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MeLi Scanner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');
  :root{--yellow:#FFE600;--blue:#3483FA;--dark:#111318;--dark2:#1C2030;--dark3:#252A3A;--text:#E8EAF0;--muted:#7A80A0;--success:#00C48C;--r:18px}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100dvh;display:flex;flex-direction:column}
  .header{padding:20px 22px 16px;display:flex;align-items:center;gap:12px;background:var(--dark2);border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:100}
  .logo{width:38px;height:38px;background:var(--yellow);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--dark);flex-shrink:0}
  .header-text h1{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.3px;line-height:1}
  .header-text p{font-size:11.5px;color:var(--muted);margin-top:2px}
  .main{flex:1;padding:22px 18px;display:flex;flex-direction:column;gap:20px;max-width:520px;width:100%;margin:0 auto}

/* Scan card */
.scan-card{background:var(–dark2);border-radius:var(–r);border:1px solid rgba(255,255,255,.07);overflow:hidden}
.scan-preview{position:relative;width:100%;aspect-ratio:4/3;background:var(–dark3);overflow:hidden;display:flex;align-items:center;justify-content:center}
.preview-img{width:100%;height:100%;object-fit:cover;display:none}
.scan-placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(–muted);text-align:center;padding:20px}
.scan-placeholder svg{opacity:.45}
.scan-placeholder p{font-size:13px;line-height:1.5;max-width:200px}
.scan-badge{position:absolute;top:10px;right:10px;background:rgba(0,196,140,.15);border:1px solid rgba(0,196,140,.3);color:var(–success);font-size:11px;padding:4px 10px;border-radius:20px;font-weight:500;display:none}
.scan-badge.show{display:block}

/* Corners decoration */
.corners{position:absolute;inset:0;pointer-events:none;display:flex;align-items:center;justify-content:center}
.corner-frame{width:65%;height:55%;position:relative}
.corner-frame::before,.corner-frame::after,.corner-frame span::before,.corner-frame span::after{content:’’;position:absolute;width:20px;height:20px;border-color:var(–yellow);border-style:solid;opacity:.7}
.corner-frame::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.corner-frame::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.corner-frame span::before{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.corner-frame span::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}

.scan-footer{padding:16px 18px;display:flex;gap:10px} .scan-footer label.btn{display:flex;flex:1;cursor:pointer;-webkit-appearance:none}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:12px;border:none;font-family:‘DM Sans’,sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;flex:1;white-space:nowrap}
.btn-primary{background:var(–yellow);color:var(–dark)}
.btn-primary:active{transform:scale(.97);background:#f0d800}
.btn-secondary{background:rgba(255,255,255,.07);color:var(–text);border:1px solid rgba(255,255,255,.1)}
.btn-secondary:active{transform:scale(.97)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}

.divider{display:flex;align-items:center;gap:10px;color:var(–muted);font-size:12px}
.divider::before,.divider::after{content:’’;flex:1;height:1px;background:rgba(255,255,255,.08)}
.input-group{display:flex;gap:8px}
.text-input{flex:1;background:var(–dark3);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 16px;color:var(–text);font-family:‘DM Sans’,sans-serif;font-size:14px;outline:none;transition:border-color .18s}
.text-input:focus{border-color:var(–blue)}
.text-input::placeholder{color:var(–muted)}

.loading-state{padding:32px 18px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.spinner{width:42px;height:42px;border:3px solid rgba(255,230,0,.15);border-top-color:var(–yellow);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state p{font-size:14px;color:var(–muted)}

.error-msg{background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.2);border-radius:12px;padding:14px 16px;font-size:13px;color:#ff8080;display:flex;gap:10px;align-items:flex-start;animation:slideUp .3s}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.result-card{background:var(–dark2);border-radius:var(–r);border:1px solid rgba(255,255,255,.07);overflow:hidden;animation:slideUp .35s cubic-bezier(.22,1,.36,1)}
.result-header{padding:14px 18px;background:rgba(0,196,140,.08);border-bottom:1px solid rgba(0,196,140,.15);display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(–success);font-weight:500}
.result-body{padding:18px;display:flex;flex-direction:column;gap:16px}
.barcode-display{background:var(–dark3);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px}
.barcode-display .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(–muted);font-weight:500}
.barcode-display .val{font-family:‘Syne’,sans-serif;font-size:16px;font-weight:700;letter-spacing:1.5px;color:var(–yellow);margin-top:2px}
.product-title{font-family:‘Syne’,sans-serif;font-size:17px;font-weight:700;line-height:1.3}
.meta{display:flex;flex-direction:column;gap:7px}
.mrow{display:flex;gap:10px;font-size:13px;align-items:flex-start}
.mrow .k{color:var(–muted);min-width:90px;flex-shrink:0}
.mrow .v{color:var(–text);line-height:1.4}
.tag{display:inline-block;background:rgba(52,131,250,.15);color:var(–blue);border:1px solid rgba(52,131,250,.25);border-radius:6px;font-size:11px;padding:2px 8px;font-weight:500}
.tag-yellow{background:rgba(255,230,0,.1);color:var(–yellow);border-color:rgba(255,230,0,.25)}

#cam-input{display:none}
.footer{padding:14px 18px 32px;text-align:center;font-size:11.5px;color:var(–muted);border-top:1px solid rgba(255,255,255,.05);margin-top:auto}
</style>

</head>
<body>

<script>
const GEMINI_KEY = "AIzaSyBM0StaSkk-LSbMgfpkiWaiXJnAk9aDPeM";

// ── Sonido beep ──────────────────────────────────
function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(1480, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.1);
    g.gain.setValueAtTime(0.5, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    o.start(); o.stop(ctx.currentTime + 0.2);
    setTimeout(() => ctx.close(), 500);
  } catch(e) {}
}
function vibrate() { try { navigator.vibrate && navigator.vibrate(80); } catch(e){} }

// ── Captura de foto (cámara nativa o galería) ────
function handleCapture(event) {
  const file = event.target.files[0];
  if (!file) return;

  hideError();
  document.getElementById('result-area').innerHTML = '';

  // Mostrar preview de la foto
  const url = URL.createObjectURL(file);
  const img = document.getElementById('preview-img');
  img.src = url;
  img.style.display = 'block';
  document.getElementById('placeholder').style.display = 'none';

  // Convertir a base64 y enviar a Gemini para que lea el código y el producto
  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    const mime = file.type || 'image/jpeg';
    await analyzeImageWithGemini(base64, mime);
  };
  reader.readAsDataURL(file);

  // Reset input para poder volver a usar la misma cámara
  event.target.value = '';
}

// ── Gemini Vision: leer código + identificar producto ──
async function analyzeImageWithGemini(base64, mime) {
  setLoading(true, 'Leyendo código de barras con IA…');

  const prompt = `Esta es una foto de una etiqueta de envío de MercadoLibre Argentina.

Tu tarea:
1. Leé el código de barras o QR que aparece en la imagen (si hay varios, usá el principal/más grande)
2. Identificá a qué producto o envío corresponde ese código
3. Si es código de envío MeLi (OCA, Andreani, Correo Argentino), indicalo

Respondé SOLO JSON sin markdown:
{
  "codigo_leido": "el número/texto del código de barras",
  "tipo_codigo": "EAN-13 / Code-128 / QR / etc",
  "es_envio_meli": true,
  "numero_tracking": null,
  "producto_nombre": "nombre descriptivo del producto o envío",
  "categoria": "Electrónica / Ropa / Hogar / Envío / etc",
  "descripcion": "descripción detallada",
  "marca": null,
  "confianza": "alta",
  "info_adicional": "datos extra útiles"
}`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inline_data: { mime_type: mime, data: base64 } },
              { text: prompt }
            ]
          }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 800 }
        })
      }
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const product = JSON.parse(raw.replace(/```json|```/g, '').trim());

    setLoading(false);
    playBeep(); vibrate();
    document.getElementById('scan-badge').classList.add('show');
    if (product.codigo_leido) document.getElementById('manual-input').value = product.codigo_leido;
    renderResult(product.codigo_leido || '—', product);

  } catch(err) {
    setLoading(false);
    const m = err.message || '';
    if (m.toLowerCase().includes('quota')) {
      showError('Límite de Gemini alcanzado. Esperá 1 minuto e intentá de nuevo.');
    } else {
      showError('Error al analizar la imagen: ' + m);
    }
  }
}

// ── Búsqueda manual por número ────────────────────
function searchManual() {
  const code = document.getElementById('manual-input').value.trim();
  if (!code) return;
  hideError();
  document.getElementById('result-area').innerHTML = '';
  searchByCode(code);
}
document.getElementById('manual-input').addEventListener('keydown', e => { if(e.key==='Enter') searchManual(); });

async function searchByCode(code) {
  setLoading(true, 'Identificando producto con IA…');
  const prompt = `Analizá el código de barras "${code}" de una etiqueta de envío de MercadoLibre Argentina.
Identificá si es código de envío (OCA/Andreani/Correo) o EAN de producto.
Respondé SOLO JSON sin markdown:
{"codigo_leido":"${code}","tipo_codigo":"...","es_envio_meli":true,"numero_tracking":null,"producto_nombre":"...","categoria":"...","descripcion":"...","marca":null,"confianza":"alta","info_adicional":"..."}`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,
      { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.2,maxOutputTokens:600} }) }
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const product = JSON.parse(raw.replace(/```json|```/g,'').trim());
    setLoading(false);
    playBeep(); vibrate();
    renderResult(code, product);
  } catch(err) {
    setLoading(false);
    const m = err.message||'';
    showError(m.toLowerCase().includes('quota') ? 'Límite de Gemini alcanzado. Esperá 1 minuto e intentá de nuevo.' : 'Error: '+m);
  }
}

// ── Render resultado ──────────────────────────────
function renderResult(code, p) {
  const cc = {alta:'#00C48C',media:'#FFB830',baja:'#FF6B6B'}[p.confianza]||'#7A80A0';
  const cl = {alta:'Alta confianza',media:'Confianza media',baja:'Baja confianza'}[p.confianza]||'';
  document.getElementById('result-area').innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Producto identificado
        <span style="margin-left:auto;color:${cc};font-size:11px;">${cl}</span>
      </div>
      <div class="result-body">
        <div class="barcode-display">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7A80A0" stroke-width="2"><path d="M3 5v14M8 5v14M12 5v14M17 5v14M21 5v14"/></svg>
          <div><div class="lbl">Código leído</div><div class="val">${code}</div></div>
          <span class="tag" style="margin-left:auto;">${p.tipo_codigo||'?'}</span>
        </div>
        <div class="product-title">${p.producto_nombre||'Sin identificar'}</div>
        <div class="meta">
          ${p.categoria?`<div class="mrow"><span class="k">Categoría</span><span class="v"><span class="tag">${p.categoria}</span></span></div>`:''}
          ${p.marca?`<div class="mrow"><span class="k">Marca</span><span class="v">${p.marca}</span></div>`:''}
          ${p.es_envio_meli?`<div class="mrow"><span class="k">Tipo</span><span class="v"><span class="tag tag-yellow">Envío MercadoLibre</span></span></div>`:''}
          ${p.numero_tracking?`<div class="mrow"><span class="k">Tracking</span><span class="v" style="font-family:'Syne',sans-serif;letter-spacing:.5px;">${p.numero_tracking}</span></div>`:''}
          <div class="mrow"><span class="k">Descripción</span><span class="v">${p.descripcion||'—'}</span></div>
          ${p.info_adicional?`<div class="mrow"><span class="k">Info extra</span><span class="v" style="color:var(--muted);">${p.info_adicional}</span></div>`:''}
        </div>
        <button class="btn btn-secondary" style="width:100%;" onclick="resetAll()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.89"/></svg>
          Escanear otro
        </button>
      </div>
    </div>`;
  document.getElementById('result-area').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function resetAll() {
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('manual-input').value = '';
  document.getElementById('preview-img').style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('scan-badge').classList.remove('show');
}
function setLoading(show, text) {
  document.getElementById('loading').style.display = show ? 'flex' : 'none';
  if (text) document.getElementById('loading-text').textContent = text;
}
function showError(msg) {
  document.getElementById('error-text').textContent = msg;
  document.getElementById('error-msg').style.display = 'flex';
}
function hideError() { document.getElementById('error-msg').style.display = 'none'; }
</script>
