<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MeLi Scanner</title>
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap');
  :root {
    --yellow:#FFE600; --blue:#3483FA; --dark:#111318;
    --dark2:#1C2030; --dark3:#252A3A;
    --text:#E8EAF0; --muted:#7A80A0; --success:#00C48C; --r:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);min-height:100dvh;display:flex;flex-direction:column}
  .header{padding:20px 22px 16px;display:flex;align-items:center;gap:12px;background:var(--dark2);border-bottom:1px solid rgba(255,255,255,.06);position:sticky;top:0;z-index:100}
  .logo{width:38px;height:38px;background:var(--yellow);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:15px;color:var(--dark);flex-shrink:0}
  .header-text h1{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;letter-spacing:-.3px;line-height:1}
  .header-text p{font-size:11.5px;color:var(--muted);margin-top:2px}
  .main{flex:1;padding:22px 18px;display:flex;flex-direction:column;gap:20px;max-width:520px;width:100%;margin:0 auto}
  .scan-card{background:var(--dark2);border-radius:var(--r);border:1px solid rgba(255,255,255,.07);overflow:hidden}
  .scan-area{position:relative;width:100%;aspect-ratio:4/3;background:#000;overflow:hidden}
  #video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
  .scan-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;color:var(--muted);background:var(--dark3)}
  .scan-placeholder svg{opacity:.45}
  .scan-placeholder p{font-size:13px;text-align:center;line-height:1.5;max-width:200px}
  .scan-overlay{position:absolute;inset:0;pointer-events:none;display:none;align-items:center;justify-content:center}
  .scan-frame{width:72%;height:36%;position:relative}
  .scan-frame::before,.scan-frame::after,.scan-frame span::before,.scan-frame span::after{content:'';position:absolute;width:22px;height:22px;border-color:var(--yellow);border-style:solid}
  .scan-frame::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
  .scan-frame::after{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
  .scan-frame span::before{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
  .scan-frame span::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
  .scan-line{position:absolute;left:10%;right:10%;height:2px;background:linear-gradient(90deg,transparent,var(--yellow),transparent);border-radius:2px;box-shadow:0 0 12px var(--yellow);top:50%;animation:scanMove 2s ease-in-out infinite}
  @keyframes scanMove{0%,100%{transform:translateY(-16px);opacity:.4}50%{transform:translateY(16px);opacity:1}}
  .scan-hint{position:absolute;bottom:14px;left:0;right:0;text-align:center;font-size:12px;color:rgba(255,255,255,.6)}
  .flash{position:absolute;inset:0;background:rgba(0,196,140,.3);opacity:0;pointer-events:none;transition:opacity .1s}
  .flash.show{opacity:1}
  .scan-footer{padding:16px 18px;display:flex;gap:10px}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;flex:1;white-space:nowrap}
  .btn-primary{background:var(--yellow);color:var(--dark)}
  .btn-primary:active{transform:scale(.97);background:#f0d800}
  .btn-secondary{background:rgba(255,255,255,.07);color:var(--text);border:1px solid rgba(255,255,255,.1)}
  .btn-secondary:active{transform:scale(.97)}
  .btn-danger{background:rgba(255,80,80,.15);color:#ff6b6b;border:1px solid rgba(255,80,80,.2)}
  .btn-danger:active{transform:scale(.97)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
  .divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
  .input-group{display:flex;gap:8px}
  .text-input{flex:1;background:var(--dark3);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .18s}
  .text-input:focus{border-color:var(--blue)}
  .text-input::placeholder{color:var(--muted)}
  .loading-state{padding:32px 18px;display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;animation:fadeIn .3s}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .spinner{width:42px;height:42px;border:3px solid rgba(255,230,0,.15);border-top-color:var(--yellow);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-state p{font-size:14px;color:var(--muted)}
  .error-msg{background:rgba(255,80,80,.08);border:1px solid rgba(255,80,80,.2);border-radius:12px;padding:14px 16px;font-size:13.5px;color:#ff8080;display:flex;gap:10px;align-items:flex-start;animation:slideUp .3s}
  @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .result-card{background:var(--dark2);border-radius:var(--r);border:1px solid rgba(255,255,255,.07);overflow:hidden;animation:slideUp .35s cubic-bezier(.22,1,.36,1)}
  .result-header{padding:14px 18px;background:rgba(0,196,140,.08);border-bottom:1px solid rgba(0,196,140,.15);display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--success);font-weight:500}
  .result-body{padding:18px;display:flex;flex-direction:column;gap:16px}
  .barcode-display{background:var(--dark3);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px}
  .barcode-display .label{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:500}
  .barcode-display .value{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;letter-spacing:1.5px;color:var(--yellow);margin-top:2px}
  .product-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;line-height:1.3;letter-spacing:-.2px}
  .product-meta{display:flex;flex-direction:column;gap:7px}
  .meta-row{display:flex;gap:10px;font-size:13px;align-items:flex-start}
  .meta-row .key{color:var(--muted);min-width:90px;flex-shrink:0}
  .meta-row .val{color:var(--text);line-height:1.4}
  .tag{display:inline-block;background:rgba(52,131,250,.15);color:var(--blue);border:1px solid rgba(52,131,250,.25);border-radius:6px;font-size:11px;padding:2px 8px;font-weight:500}
  #file-input{display:none}
  .footer{padding:14px 18px 28px;text-align:center;font-size:11.5px;color:var(--muted);border-top:1px solid rgba(255,255,255,.05);margin-top:auto}
</style>
</head>
<body>

<div class="header">
  <div class="logo">ML</div>
  <div class="header-text">
    <h1>MeLi Scanner</h1>
    <p>Identificá productos por código de barras</p>
  </div>
</div>

<div class="main">
  <div class="scan-card">
    <div class="scan-area">
      <video id="video" autoplay playsinline muted></video>
      <div class="scan-placeholder" id="placeholder">
        <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
          <rect x="4" y="4" width="12" height="3" rx="1.5" fill="#7A80A0"/><rect x="4" y="4" width="3" height="12" rx="1.5" fill="#7A80A0"/>
          <rect x="40" y="4" width="12" height="3" rx="1.5" fill="#7A80A0"/><rect x="49" y="4" width="3" height="12" rx="1.5" fill="#7A80A0"/>
          <rect x="4" y="49" width="12" height="3" rx="1.5" fill="#7A80A0"/><rect x="4" y="40" width="3" height="12" rx="1.5" fill="#7A80A0"/>
          <rect x="40" y="49" width="12" height="3" rx="1.5" fill="#7A80A0"/><rect x="49" y="40" width="3" height="12" rx="1.5" fill="#7A80A0"/>
          <rect x="14" y="20" width="2" height="16" rx="1" fill="#7A80A0"/><rect x="18" y="20" width="4" height="16" rx="1" fill="#7A80A0"/>
          <rect x="24" y="20" width="2" height="16" rx="1" fill="#7A80A0"/><rect x="28" y="20" width="5" height="16" rx="1" fill="#7A80A0"/>
          <rect x="35" y="20" width="2" height="16" rx="1" fill="#7A80A0"/><rect x="39" y="20" width="3" height="16" rx="1" fill="#7A80A0"/>
        </svg>
        <p>Tocá "Escanear" para activar la cámara</p>
      </div>
      <div class="scan-overlay" id="scan-overlay">
        <div class="scan-frame"><span></span><div class="scan-line"></div></div>
        <div class="scan-hint">Apuntá al código de barras del label</div>
      </div>
      <div class="flash" id="flash"></div>
    </div>
    <div class="scan-footer">
      <button class="btn btn-primary" id="btn-scan" onclick="toggleScanner()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        Escanear
      </button>
      <label for="file-input" class="btn btn-secondary" style="cursor:pointer;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Foto
      </label>
      <input type="file" id="file-input" accept="image/*" onchange="handleImageUpload(event)">
    </div>
  </div>

  <div class="divider">o ingresá el código manualmente</div>

  <div class="input-group">
    <input type="text" class="text-input" id="manual-input" placeholder="Ej: 7798067150" inputmode="numeric">
    <button class="btn btn-secondary" style="flex:0 0 auto;padding:12px 18px;" onclick="searchManual()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
  </div>

  <div class="loading-state" id="loading" style="display:none;">
    <div class="spinner"></div>
    <p>Identificando producto con IA…</p>
  </div>

  <div class="error-msg" id="error-msg" style="display:none;">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="error-text"></span>
  </div>

  <div id="result-area"></div>
</div>

<div class="footer">Powered by Gemini IA · Escanea etiquetas de MercadoLibre</div>

<script>
const GEMINI_KEY = "AIzaSyCB9WYf8wGCOmXkYebR1Y4q_Plob5Iw9tU";

let scannerActive = false;
let lastCode = null;
let currentStream = null;
let scanLoop = false;

// ── Audio beep ────────────────────────────────────
function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(1480, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(880, ctx.currentTime + 0.08);
    g.gain.setValueAtTime(0.5, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.18);
    o.start(); o.stop(ctx.currentTime + 0.18);
    setTimeout(() => ctx.close(), 400);
  } catch(e) {}
}
function vibrate() { try { navigator.vibrate && navigator.vibrate(80); } catch(e){} }
function flashGreen() {
  const f = document.getElementById('flash');
  f.classList.add('show');
  setTimeout(() => f.classList.remove('show'), 350);
}

// ── Scanner ───────────────────────────────────────
function toggleScanner() {
  scannerActive ? stopScanner() : startScanner();
}

async function startScanner() {
  const btn = document.getElementById('btn-scan');
  btn.disabled = true;
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Iniciando…`;

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    currentStream = stream;

    const video = document.getElementById('video');
    video.srcObject = stream;
    await video.play();

    video.style.display = 'block';
    document.getElementById('placeholder').style.display = 'none';
    document.getElementById('scan-overlay').style.display = 'flex';

    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/></svg> Detener`;
    btn.className = 'btn btn-danger';
    scannerActive = true;
    scanLoop = true;
    runScanLoop(video);

  } catch(err) {
    btn.disabled = false;
    btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Escanear`;
    btn.className = 'btn btn-primary';
    if (err.name === 'NotAllowedError') {
      showError('Permiso de cámara denegado. En iOS: Ajustes → Safari → Cámara → Permitir. Luego recargá la página.');
    } else {
      showError('No se pudo acceder a la cámara: ' + err.message);
    }
  }
}

function runScanLoop(video) {
  if (!scanLoop) return;
  if (video.readyState < 2) { requestAnimationFrame(() => runScanLoop(video)); return; }

  const canvas = document.createElement('canvas');
  const ctx2d = canvas.getContext('2d');

  // Construir reader ZXing con todos los formatos
  const hints = new Map();
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  const reader = new ZXing.MultiFormatReader();
  reader.setHints(hints);

  function tick() {
    if (!scanLoop) return;
    if (video.readyState >= 2) {
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx2d.drawImage(video, 0, 0);
      try {
        const lum = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
        const bin = new ZXing.HybridBinarizer(lum);
        const bmp = new ZXing.BinaryBitmap(bin);
        const result = reader.decode(bmp);
        if (result) {
          const code = result.getText();
          if (code && code !== lastCode) {
            lastCode = code;
            scanLoop = false;
            playBeep(); vibrate(); flashGreen();
            setTimeout(() => { stopScanner(); searchProduct(code); }, 300);
            return;
          }
        }
      } catch(e) { /* sin código en este frame */ }
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function stopScanner() {
  scannerActive = false;
  scanLoop = false;
  if (currentStream) { currentStream.getTracks().forEach(t => t.stop()); currentStream = null; }
  const video = document.getElementById('video');
  video.srcObject = null;
  video.style.display = 'none';
  document.getElementById('placeholder').style.display = 'flex';
  document.getElementById('scan-overlay').style.display = 'none';
  const btn = document.getElementById('btn-scan');
  btn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg> Escanear`;
  btn.className = 'btn btn-primary';
}

// ── Subir foto ────────────────────────────────────
function handleImageUpload(event) {
  const file = event.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width = img.width; c.height = img.height;
    c.getContext('2d').drawImage(img, 0, 0);
    try {
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
      const reader = new ZXing.MultiFormatReader();
      reader.setHints(hints);
      const lum = new ZXing.HTMLCanvasElementLuminanceSource(c);
      const result = reader.decode(new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum)));
      if (result) { playBeep(); vibrate(); searchProduct(result.getText()); }
    } catch(e) {
      showError("No se encontró código en la imagen. Intentá con una foto más nítida y bien derecha.");
    }
  };
  img.src = URL.createObjectURL(file);
}

// ── Manual ────────────────────────────────────────
function searchManual() {
  const v = document.getElementById('manual-input').value.trim();
  if (v) searchProduct(v);
}
document.getElementById('manual-input').addEventListener('keydown', e => { if(e.key==='Enter') searchManual(); });

// ── Gemini ────────────────────────────────────────
async function searchProduct(code) {
  hideError();
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('manual-input').value = code;

  const prompt = `Analizá el código de barras de una etiqueta de envío de MercadoLibre Argentina: "${code}"
Identificá: si es código de envío MeLi (OCA/Andreani/Correo), tipo (EAN-13/Code-128/etc.), y si es EAN de producto identificá el artículo.
Respondé SOLO JSON sin markdown ni backticks:
{"tipo_codigo":"...","es_envio_meli":true,"numero_tracking":null,"producto_nombre":"...","categoria":"...","descripcion":"...","marca":null,"confianza":"alta","info_adicional":"..."}`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`,
      { method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.2,maxOutputTokens:800} }) }
    );
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const product = JSON.parse(raw.replace(/```json|```/g,'').trim());
    document.getElementById('loading').style.display = 'none';
    renderResult(code, product);
  } catch(err) {
    document.getElementById('loading').style.display = 'none';
    const m = err.message || '';
    showError(m.toLowerCase().includes('quota') ? 'Límite de Gemini alcanzado. Esperá 1 minuto e intentá de nuevo.' : 'Error: ' + m);
  }
}

// ── Render ────────────────────────────────────────
function renderResult(code, p) {
  const cc = {alta:'#00C48C',media:'#FFB830',baja:'#FF6B6B'}[p.confianza]||'#7A80A0';
  const cl = {alta:'Alta confianza',media:'Confianza media',baja:'Baja confianza'}[p.confianza]||'';
  document.getElementById('result-area').innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        Producto identificado
        <span style="margin-left:auto;color:${cc};font-size:11px;">${cl}</span>
      </div>
      <div class="result-body">
        <div class="barcode-display">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#7A80A0" stroke-width="2"><path d="M3 5v14M8 5v14M12 5v14M17 5v14M21 5v14"/></svg>
          <div><div class="label">Código escaneado</div><div class="value">${code}</div></div>
          <span class="tag" style="margin-left:auto;">${p.tipo_codigo||'?'}</span>
        </div>
        <div class="product-title">${p.producto_nombre||'Producto sin identificar'}</div>
        <div class="product-meta">
          ${p.categoria?`<div class="meta-row"><span class="key">Categoría</span><span class="val"><span class="tag">${p.categoria}</span></span></div>`:''}
          ${p.marca?`<div class="meta-row"><span class="key">Marca</span><span class="val">${p.marca}</span></div>`:''}
          ${p.es_envio_meli?`<div class="meta-row"><span class="key">Tipo</span><span class="val"><span class="tag" style="background:rgba(255,230,0,.1);color:var(--yellow);border-color:rgba(255,230,0,.25);">Envío MercadoLibre</span></span></div>`:''}
          ${p.numero_tracking?`<div class="meta-row"><span class="key">Tracking</span><span class="val" style="font-family:'Syne',sans-serif;letter-spacing:.5px;">${p.numero_tracking}</span></div>`:''}
          <div class="meta-row"><span class="key">Descripción</span><span class="val">${p.descripcion||'—'}</span></div>
          ${p.info_adicional?`<div class="meta-row"><span class="key">Info extra</span><span class="val" style="color:var(--muted);">${p.info_adicional}</span></div>`:''}
        </div>
        <button class="btn btn-secondary" style="width:100%;" onclick="resetResult()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.89"/></svg>
          Escanear otro código
        </button>
      </div>
    </div>`;
  document.getElementById('result-area').scrollIntoView({behavior:'smooth',block:'nearest'});
  lastCode = null;
}

function resetResult() {
  document.getElementById('result-area').innerHTML = '';
  document.getElementById('manual-input').value = '';
  lastCode = null;
}
function showError(msg) {
  document.getElementById('error-text').textContent = msg;
  document.getElementById('error-msg').style.display = 'flex';
  lastCode = null;
}
function hideError() { document.getElementById('error-msg').style.display = 'none'; }
</script>
